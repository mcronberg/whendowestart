<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#1a1a2e"/>
  <!-- Outer clock ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.9"/>
  <!-- Tick marks -->
  <line x1="50" y1="12" x2="50" y2="18" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="82" x2="50" y2="88" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="12" y1="50" x2="18" y2="50" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="82" y1="50" x2="88" y2="50" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- Hour hand (pointing ~10 o'clock) -->
  <line x1="50" y1="50" x2="32" y2="28" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~3 o'clock) -->
  <line x1="50" y1="50" x2="76" y2="50" stroke="#4ade80" stroke-width="4" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#ffffff"/>
</svg>
